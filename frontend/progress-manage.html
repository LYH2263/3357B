<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习进度管理 - SchoolSystemC02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .sidebar {
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: all 0.3s;
        }
        .main-content {
            margin-left: 250px;
            padding: 2rem;
            transition: all 0.3s;
        }
        .nav-link {
            border-radius: 0.5rem;
            margin: 0.2rem 0;
            padding: 0.8rem 1rem;
            color: #333;
        }
        .nav-link:hover, .nav-link.active {
            background: #f0f4ff;
            color: var(--primary-color);
        }
        .nav-link i { margin-right: 10px; }
        .stat-card {
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            color: #fff;
        }
        .stat-card.primary { background: linear-gradient(135deg, #4e73df, #224abe); }
        .stat-card.success { background: linear-gradient(135deg, #1cc88a, #13855c); }
        .stat-card.info { background: linear-gradient(135deg, #36b9cc, #258591); }
        .progress-bar-mini {
            height: 8px;
            border-radius: 4px;
            background: #e9ecef;
            overflow: hidden;
        }
        .progress-bar-mini .fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #4e73df, #1cc88a);
            transition: width 0.4s ease;
        }
        .heat-bar {
            height: 20px;
            border-radius: 10px;
            background: #e9ecef;
            overflow: hidden;
        }
        .heat-bar .fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #f6c23e, #e74a3b);
            transition: width 0.4s ease;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 11px;
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="sidebar d-flex flex-column p-3">
        <a href="teacher.html" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none p-2">
            <span class="fs-4 fw-bold text-primary">管理后台</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li><a href="teacher.html" class="nav-link"><i class="bi bi-arrow-left"></i>返回主面板</a></li>
            <li><a href="#" class="nav-link active" onclick="showTab('overview')"><i class="bi bi-speedometer2"></i>进度总览</a></li>
            <li><a href="#" class="nav-link" onclick="showTab('class-detail')"><i class="bi bi-people"></i>班级进度</a></li>
            <li><a href="#" class="nav-link" onclick="showTab('heat')"><i class="bi bi-fire"></i>内容热度</a></li>
            <li><a href="point-teacher.html" class="nav-link"><i class="bi bi-star-fill text-warning"></i>积分管理</a></li>
        </ul>
        <hr>
        <div class="p-2">
            <button class="btn btn-outline-danger w-100" onclick="api.clearSession()">登出</button>
        </div>
    </div>

    <div class="main-content">
        <div id="overview-section">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold"><i class="bi bi-speedometer2 text-primary me-2"></i>学习进度总览</h4>
                <button class="btn btn-sm btn-outline-primary" onclick="loadOverview()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
            </div>

            <div class="row mb-4" id="classOverviewCards"></div>

            <div class="card p-4">
                <h6 class="fw-bold mb-3">各班级平均完成率</h6>
                <div id="classOverviewBars"></div>
            </div>
        </div>

        <div id="class-detail-section" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold"><i class="bi bi-people text-primary me-2"></i>班级学习进度</h4>
                <div class="d-flex align-items-center gap-2">
                    <select id="classSelect" class="form-select form-select-sm" style="width:200px;" onchange="loadClassDetail()">
                    </select>
                    <button class="btn btn-sm btn-outline-primary" onclick="loadClassDetail()">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="stat-card primary">
                        <h3 id="classTotalStudents" class="fw-bold mb-1">0</h3>
                        <small>班级人数</small>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card success">
                        <h3 id="classAvgPercent" class="fw-bold mb-1">0%</h3>
                        <small>平均完成率</small>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card info">
                        <h3 id="classTotalCourses" class="fw-bold mb-1">0</h3>
                        <small>教学内容总数</small>
                    </div>
                </div>
            </div>

            <div class="card p-4">
                <h6 class="fw-bold mb-3">学生进度明细</h6>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>学号</th>
                                <th>已学完</th>
                                <th>进度</th>
                                <th>完成率</th>
                            </tr>
                        </thead>
                        <tbody id="classStudentTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="heat-section" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold"><i class="bi bi-fire text-danger me-2"></i>教学内容热度排行</h4>
                <button class="btn btn-sm btn-outline-primary" onclick="loadHeatRanking()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
            </div>

            <div class="card p-4">
                <p class="text-muted small mb-3">统计每条教学内容被多少学生标记为「已学完」</p>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th style="width:60px;">排名</th>
                                <th>教学内容</th>
                                <th style="width:120px;">已学完人数</th>
                                <th style="width:250px;">热度</th>
                            </tr>
                        </thead>
                        <tbody id="heatTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        const session = api.getSession();
        if (!session.user || session.role !== 'teacher') location.href = 'index.html';

        let classesList = [];
        let heatData = [];

        function showTab(tab) {
            document.getElementById('overview-section').style.display = tab === 'overview' ? 'block' : 'none';
            document.getElementById('class-detail-section').style.display = tab === 'class-detail' ? 'block' : 'none';
            document.getElementById('heat-section').style.display = tab === 'heat' ? 'block' : 'none';
            document.querySelectorAll('.sidebar .nav-link').forEach(l => l.classList.remove('active'));
            event.target.closest('.nav-link').classList.add('active');

            if (tab === 'overview') loadOverview();
            if (tab === 'class-detail') loadClassDetail();
            if (tab === 'heat') loadHeatRanking();
        }

        async function initClasses() {
            try {
                classesList = await api.request('/classes/list');
                const select = document.getElementById('classSelect');
                select.innerHTML = classesList.map(c =>
                    `<option value="${c.cid}">${c.cname}</option>`
                ).join('');
            } catch (err) { }
        }

        async function loadOverview() {
            try {
                const classData = await api.request('/progress/all-class-average');
                const cardsContainer = document.getElementById('classOverviewCards');
                const barsContainer = document.getElementById('classOverviewBars');

                const top5 = classData
                    .sort((a, b) => (b.averagePercentage || 0) - (a.averagePercentage || 0))
                    .slice(0, 5);

                cardsContainer.innerHTML = top5.map(c => `
                    <div class="col-md-4 mb-3">
                        <div class="card p-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="fw-bold mb-0">${c.className || '-'}</h6>
                                <span class="badge bg-primary">${(c.averagePercentage || 0)}%</span>
                            </div>
                            <div class="progress-bar-mini">
                                <div class="fill" style="width: ${c.averagePercentage || 0}%"></div>
                            </div>
                            <div class="d-flex justify-content-between mt-2 small text-muted">
                                <span>${c.totalStudents || 0} 名学生</span>
                                <span>${c.totalCourses || 0} 项内容</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                barsContainer.innerHTML = classData
                    .sort((a, b) => (b.averagePercentage || 0) - (a.averagePercentage || 0))
                    .map(c => `
                        <div class="d-flex align-items-center mb-3">
                            <div style="width:120px;" class="small fw-bold text-truncate">${c.className || '-'}</div>
                            <div class="flex-grow-1 mx-3">
                                <div class="progress-bar-mini">
                                    <div class="fill" style="width: ${c.averagePercentage || 0}%"></div>
                                </div>
                            </div>
                            <div style="width:60px;" class="text-end small fw-bold">${(c.averagePercentage || 0)}%</div>
                        </div>
                    `).join('');
            } catch (err) { }
        }

        async function loadClassDetail() {
            const classId = document.getElementById('classSelect').value;
            if (!classId) return;

            try {
                const avgRes = await api.request(`/progress/class-average?classId=${classId}`);
                document.getElementById('classTotalStudents').innerText = avgRes.totalStudents;
                document.getElementById('classAvgPercent').innerText = (avgRes.averagePercentage || 0) + '%';
                document.getElementById('classTotalCourses').innerText = avgRes.totalCourses;

                const students = await api.request(`/progress/class-students?classId=${classId}`);
                const table = document.getElementById('classStudentTable');
                table.innerHTML = students.map(s => {
                    const pct = s.percentage || 0;
                    const barColor = pct >= 80 ? 'bg-success' : (pct >= 50 ? 'bg-primary' : (pct >= 20 ? 'bg-warning' : 'bg-danger'));
                    return `
                        <tr>
                            <td class="fw-bold">${s.studentName || '-'}</td>
                            <td class="text-muted small">${s.studentNo || '-'}</td>
                            <td>${s.completedCount || 0} / ${s.totalCourses || 0}</td>
                            <td style="width:200px;">
                                <div class="progress" style="height:8px;">
                                    <div class="progress-bar ${barColor}" style="width:${pct}%"></div>
                                </div>
                            </td>
                            <td><span class="badge ${pct >= 80 ? 'bg-success' : (pct >= 50 ? 'bg-primary' : (pct >= 20 ? 'bg-warning' : 'bg-danger'))}">${pct}%</span></td>
                        </tr>
                    `;
                }).join('');
            } catch (err) { }
        }

        async function loadHeatRanking() {
            try {
                heatData = await api.request('/progress/course-heat');
                const maxCount = heatData.length > 0 ? Math.max(...heatData.map(h => h.completedCount || 0)) : 1;
                const table = document.getElementById('heatTable');
                table.innerHTML = heatData.map((h, idx) => {
                    const width = maxCount > 0 ? (h.completedCount / maxCount * 100) : 0;
                    const rankIcon = idx < 3
                        ? `<span class="badge ${idx === 0 ? 'bg-danger' : (idx === 1 ? 'bg-warning' : 'bg-info')}">${idx + 1}</span>`
                        : `<span class="text-muted">${idx + 1}</span>`;
                    return `
                        <tr>
                            <td class="text-center">${rankIcon}</td>
                            <td class="fw-bold">${h.courseTitle || '-'}</td>
                            <td class="fw-bold text-center">${h.completedCount || 0} 人</td>
                            <td>
                                <div class="heat-bar">
                                    <div class="fill" style="width:${width}%">${h.completedCount > 0 ? h.completedCount + '人' : ''}</div>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) { }
        }

        async function init() {
            await initClasses();
            loadOverview();
        }

        init();
    </script>
</body>

</html>
