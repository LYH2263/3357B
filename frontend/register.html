<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生注册 - SchoolSystemC02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-gradient-primary">
    <div class="container login-container" style="max-width: 600px;">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h1 class="h4 text-gray-900 mb-4">注册新账号</h1>
                </div>
                <form id="regForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">姓名</label>
                            <input type="text" id="username" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">学号</label>
                            <input type="text" id="userno" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">性别</label>
                            <select id="usersex" class="form-select">
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">选择班级</label>
                        <select id="classId" class="form-select" required>
                            <option value="">加载中...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">个人描述</label>
                        <textarea id="userdescript" class="form-control" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">提交注册</button>
                    <hr>
                    <div class="text-center">
                        <a class="small" href="index.html">已有账号？返到登录</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function loadClasses() {
            try {
                const classes = await api.request('/classes/list');
                const select = document.getElementById('classId');
                select.innerHTML = '<option value="">请选择班级</option>' +
                    classes.map(c => `<option value="${c.cid}" data-name="${c.cname}">${c.cname}</option>`).join('');
            } catch (err) {
                api.showToast('无法获取班级列表', 'danger');
            }
        }

        loadClasses();

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const classSelect = document.getElementById('classId');
            const data = {
                username: document.getElementById('username').value,
                userno: document.getElementById('userno').value,
                userpassword: document.getElementById('password').value,
                usersex: document.getElementById('usersex').value,
                classId: classSelect.value,
                classname: classSelect.options[classSelect.selectedIndex].getAttribute('data-name'),
                userdescript: document.getElementById('userdescript').value,
                upic: 'default.jpg'
            };

            try {
                const res = await api.request('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                if (res.success) {
                    api.showToast(res.message, 'success');
                    setTimeout(() => location.href = 'index.html', 2000);
                } else {
                    api.showToast(res.message, 'danger');
                }
            } catch (err) {
                api.showToast('注册请求发送失败', 'danger');
            }
        });
    </script>
</body>

</html>
