services:
  db:
    image: mysql:8.0
    container_name: school_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school_system
    ports:
      - "33570:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./uploads:/app/uploads
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - school_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_backend
    ports:
      - "8357:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/school_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - school_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school_frontend
    ports:
      - "3357:80"
    depends_on:
      - backend
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads
    networks:
      - school_net

volumes:
  db_data:


networks:
  school_net:
    driver: bridge
