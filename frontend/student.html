<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生中心 - SchoolSystemC02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .nav-link.active {
            color: var(--primary-color) !important;
            border-bottom: 2px solid var(--primary-color);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">SchoolSystem</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-link px-3 active" role="button" onclick="showSection('home')">首页</li>
                    <li class="nav-link px-3" role="button" onclick="showSection('course-intro')">课程介绍</li>
                    <li class="nav-link px-3" role="button" onclick="showSection('teaching')">教学内容</li>
                    <li class="nav-link px-3" role="button" onclick="showSection('experiment')">实验内容</li>
                    <li class="nav-link px-3" role="button" onclick="showSection('interact')">互动交流</li>
                    <li class="nav-link px-3" role="button" onclick="showNotificationCenter()">通知中心</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='homework-student.html'">作业中心</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='exam-student.html'">在线测验</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='elective-student.html'">选课中心</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='signin-student.html'">签到中心</li>
                </ul>
                <div class="d-flex align-items-center">
                    <div class="dropdown me-3">
                        <button class="btn btn-outline-secondary btn-sm position-relative" type="button" data-bs-toggle="dropdown" aria-expanded="false" onclick="refreshNotificationPanel()">
                            <i class="bi bi-bell"></i>
                            <span id="unreadBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none;">0</span>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end shadow p-0" style="width:400px;max-height:500px;overflow:hidden;">
                            <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light">
                                <h6 class="fw-bold mb-0">公告通知</h6>
                                <button class="btn btn-sm btn-outline-primary" onclick="markAllAsRead()">全部已读</button>
                            </div>
                            <div id="notificationList" style="max-height:400px;overflow-y:auto;">
                                <div class="text-center py-5 text-muted">
                                    <div class="spinner-border text-primary spinner-border-sm"></div>
                                </div>
                            </div>
                            <div class="border-top p-2 text-center bg-light">
                                <a href="#" class="text-decoration-none small" onclick="showNotificationCenter();return false;">查看全部通知</a>
                            </div>
                        </div>
                    </div>
                    <span id="userInfo" class="me-3 text-muted small"></span>
                    <button class="btn btn-outline-danger btn-sm" onclick="api.clearSession()">登出</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Home Section -->
        <div id="home-section" class="section">
            <div class="row">
                <div class="col-md-8">
                    <div class="card p-4 mb-4">
                        <h5 class="fw-bold mb-3">最新技术动态</h5>
                        <div id="news-list" class="list-group list-group-flush">
                            <!-- JS loaded -->
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-4 text-center">
                        <img id="userPic" src="https://ui-avatars.com/api/?name=%E5%AD%A6&background=0D6EFD&color=fff"
                            class="rounded-circle mx-auto mb-3" style="width: 80px; height: 80px; object-fit: cover;">
                        <h6 id="userName" class="fw-bold"></h6>
                        <p id="userNo" class="text-muted small mb-0"></p>
                        <p id="userClass" class="text-muted small"></p>
                        <hr>
                        <div class="text-start">
                            <p class="small text-muted mb-1">个人描述：</p>
                            <p id="userDesc" class="small"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Course Intro Section -->
        <div id="course-intro-section" class="section d-none">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">课程介绍查询</h5>
                    <div class="input-group" style="max-width: 300px;">
                        <input type="text" id="courseSearchInput" class="form-control" placeholder="输入关键字...">
                        <button class="btn btn-primary" onclick="searchCourseIntro()">搜索</button>
                    </div>
                </div>
                <div class="row" id="course-intro-list">
                    <!-- JS loaded -->
                </div>
            </div>
        </div>

        <!-- Teaching Content Section -->
        <div id="teaching-section" class="section d-none">
            <div class="card p-4">
                <h5 class="fw-bold mb-4">教学内容列表</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>摘要</th>
                                <th>附件</th>
                            </tr>
                        </thead>
                        <tbody id="teaching-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Experiment Content Section -->
        <div id="experiment-section" class="section d-none">
            <div class="card p-4">
                <h5 class="fw-bold mb-4">实验内容列表</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>实验名称</th>
                                <th>任务详情</th>
                                <th>相关文件</th>
                            </tr>
                        </thead>
                        <tbody id="experiment-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Notification Center Section -->
        <div id="notification-section" class="section d-none">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">公告通知中心</h5>
                    <div>
                        <button class="btn btn-sm btn-outline-primary" onclick="markAllAsRead()">
                            <i class="bi bi-check2-all"></i> 全部标记已读
                        </button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="loadNotifications()">
                            <i class="bi bi-arrow-clockwise"></i> 刷新
                        </button>
                    </div>
                </div>
                <div id="notificationCenterList" class="list-group gap-2">
                    <div class="text-center py-5 text-muted">
                        <div class="spinner-border text-primary"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Interact Section -->
        <div id="interact-section" class="section d-none">
            <div class="row">
                <div class="col-md-4">
                    <div class="card p-4">
                        <h5 class="fw-bold mb-3">发起提问</h5>
                        <form id="askForm">
                            <div class="mb-3">
                                <label class="form-label">问题内容</label>
                                <textarea id="askContent" class="form-control" rows="5" required
                                    placeholder="请描述您的问题..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">提交问题</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card p-4">
                        <h5 class="fw-bold mb-3">我的提问与解答</h5>
                        <div id="interaction-list" class="list-group gap-3">
                            <!-- JS loaded -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Announcement Detail Modal -->
    <div class="modal fade" id="announcementDetailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="detailAnnouncementTitle">公告详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailAnnouncementBody">
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        const session = api.getSession();
        if (!session.user || session.role !== 'student') location.href = 'index.html';

        // Init User Info
        document.getElementById('userInfo').innerText = `欢迎，${session.user.username}`;
        document.getElementById('userName').innerText = session.user.username;
        document.getElementById('userNo').innerText = '学号: ' + session.user.userno;
        document.getElementById('userClass').innerText = session.user.classname;
        document.getElementById('userDesc').innerText = session.user.userdescript || '暂无描述';
        document.getElementById('userPic').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(session.user.username)}&background=random`;

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('d-none'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`${id}-section`).classList.remove('d-none');
            event.target.classList.add('active');

            if (id === 'home') loadNews();
            if (id === 'course-intro') loadCourseIntros();
            if (id === 'teaching') loadTeaching();
            if (id === 'experiment') loadExperiments();
            if (id === 'interact') loadInteractions();
        }

        async function loadNews() {
            const list = document.getElementById('news-list');
            list.innerHTML = '<div class="skeleton" style="height: 100px;"></div>';
            try {
                const data = await api.request('/news/list');
                list.innerHTML = data.slice(0, 10).map(n => `
                    <div class="list-group-item border-0 px-0 py-3">
                        <div class="d-flex justify-content-between">
                            <h6 class="mb-1 fw-bold">${n.newstitle}</h6>
                            <small class="text-muted">${n.newsdate.split('T')[0]}</small>
                        </div>
                        <p class="mb-1 text-muted small text-truncate">${n.newscontent}</p>
                    </div>
                `).join('');
            } catch (err) { }
        }

        async function loadCourseIntros() {
            const list = document.getElementById('course-intro-list');
            try {
                const data = await api.request('/test/list');
                renderCourseIntros(data);
            } catch (err) { }
        }

        async function searchCourseIntro() {
            const keyword = document.getElementById('courseSearchInput').value;
            const list = document.getElementById('course-intro-list');
            try {
                const data = await api.request(`/test/search?keyword=${keyword}`);
                renderCourseIntros(data);
            } catch (err) { }
        }

        function renderCourseIntros(data) {
            const list = document.getElementById('course-intro-list');
            list.innerHTML = data.map(c => `
                <div class="col-md-6 mb-3">
                    <div class="card h-100 p-3 bg-light">
                        <h6 class="fw-bold">${c.ttitle}</h6>
                        <p class="small text-muted mb-0">${c.tcontent}</p>
                    </div>
                </div>
            `).join('');
        }

        async function loadTeaching() {
            const list = document.getElementById('teaching-list');
            try {
                const data = await api.request('/course/list');
                list.innerHTML = data.map(c => `
                    <tr>
                        <td>${c.ctitle}</td>
                        <td class="small text-muted">${c.ccontent}</td>
                        <td>
                            ${c.efile ? `<a href="/uploads/${c.efile}" class="btn btn-sm btn-outline-primary" target="_blank"><i class="bi bi-eye"></i> 查看内容</a>` : '<span class="text-muted small">暂无附件</span>'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) { }
        }

        async function loadExperiments() {
            const list = document.getElementById('experiment-list');
            try {
                const data = await api.request('/experiment/list');
                list.innerHTML = data.map(e => `
                    <tr>
                        <td>${e.etitle}</td>
                        <td class="small text-muted">${e.econtent}</td>
                        <td>
                            ${e.efile ? `<a href="/uploads/${e.efile}" class="btn btn-sm btn-outline-success" target="_blank"><i class="bi bi-file-earmark-arrow-down"></i> 查看配套文件</a>` : '<span class="text-muted small">暂无文件</span>'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) { }
        }

        async function loadInteractions() {
            const list = document.getElementById('interaction-list');
            try {
                const data = await api.request('/interaction/list');
                const myQuestions = data.filter(i => i.name === session.user.username);
                list.innerHTML = myQuestions.map(i => `
                    <div class="list-group-item border shadow-sm">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="badge bg-primary">我提问:</span>
                            <small class="text-muted">${i.asktime.replace('T', ' ')}</small>
                        </div>
                        <p class="mb-3">${i.comask}</p>
                        ${i.comrepl ? `
                            <div class="bg-light p-3 rounded">
                                <div class="d-flex justify-content-between mb-1">
                                    <span class="text-success small fw-bold">${i.replname} 回答：</span>
                                    <small class="text-muted">${i.repltime.replace('T', ' ')}</small>
                                </div>
                                <p class="mb-0 small">${i.comrepl}</p>
                            </div>
                        ` : '<div class="text-muted small italic">等待老师回答...</div>'}
                    </div>
                `).join('');
            } catch (err) { }
        }

        document.getElementById('askForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('askContent').value;
            try {
                await api.request('/interaction/ask', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: session.user.username,
                        comask: content
                    })
                });
                api.showToast('提问成功', 'success');
                document.getElementById('askContent').value = '';
                loadInteractions();
            } catch (err) { }
        });

        let currentNotifications = [];

        function showNotificationCenter() {
            document.querySelectorAll('.section').forEach(s => s.classList.add('d-none'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('notification-section').classList.remove('d-none');
            document.querySelectorAll('.nav-link').forEach(l => {
                if (l.innerText === '通知中心') l.classList.add('active');
            });
            loadNotifications();
        }

        async function refreshUnreadCount() {
            try {
                const res = await api.request(`/announcement/student/unread-count?studentId=${session.user.uid}&classId=${session.user.classId}`);
                const badge = document.getElementById('unreadBadge');
                if (res.unreadCount > 0) {
                    badge.style.display = 'inline-block';
                    badge.innerText = res.unreadCount > 99 ? '99+' : res.unreadCount;
                } else {
                    badge.style.display = 'none';
                }
                return res.unreadCount;
            } catch (err) {
                return 0;
            }
        }

        async function refreshNotificationPanel() {
            const list = document.getElementById('notificationList');
            try {
                currentNotifications = await api.request(`/announcement/student/list?studentId=${session.user.uid}&classId=${session.user.classId}`);
                refreshUnreadCount();

                if (currentNotifications.length === 0) {
                    list.innerHTML = '<div class="text-center py-5 text-muted small">暂无公告通知</div>';
                    return;
                }

                const top5 = currentNotifications.slice(0, 5);
                list.innerHTML = top5.map((item, idx) => renderNotificationItem(item, idx, true)).join('');
            } catch (err) {
                list.innerHTML = '<div class="text-center py-5 text-muted small">加载失败</div>';
            }
        }

        async function loadNotifications() {
            const list = document.getElementById('notificationCenterList');
            list.innerHTML = '<div class="text-center py-5 text-muted"><div class="spinner-border text-primary"></div></div>';
            try {
                currentNotifications = await api.request(`/announcement/student/list?studentId=${session.user.uid}&classId=${session.user.classId}`);
                refreshUnreadCount();

                if (currentNotifications.length === 0) {
                    list.innerHTML = '<div class="text-center py-5 text-muted">暂无公告通知</div>';
                    return;
                }

                list.innerHTML = currentNotifications.map((item, idx) => renderNotificationItem(item, idx, false)).join('');
            } catch (err) {
                list.innerHTML = '<div class="text-center py-5 text-muted">加载失败，请重试</div>';
            }
        }

        function renderNotificationItem(item, idx, compact) {
            const unreadDot = !item.isRead ? '<span class="badge bg-danger me-2" style="width:8px;height:8px;padding:0;border-radius:50%;display:inline-block;"></span>' : '';
            const pinIcon = item.isPinned ? '<i class="bi bi-pin-angle-fill text-danger me-1"></i>' : '';
            const targetText = item.targetType === 'ALL' ? '全体学生' : (item.classList && item.classList.length > 0 ? item.classList.map(c => c.className).join('、') : '');
            const time = item.publishedAt ? item.publishedAt.replace('T', ' ') : '-';

            if (compact) {
                return `
                    <div class="list-group-item list-group-item-action border-0 px-3 py-2 ${!item.isRead ? 'bg-light' : ''}" onclick="openAnnouncementDetail(${idx})" style="cursor:pointer;">
                        <div class="d-flex align-items-start">
                            ${unreadDot}
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <h6 class="mb-0 fw-bold small">${pinIcon}${item.title}</h6>
                                    <small class="text-muted ms-2">${time.split(' ')[0]}</small>
                                </div>
                                <p class="mb-0 small text-muted text-truncate">${item.content}</p>
                                <small class="text-muted"><i class="bi bi-person"></i> ${item.createdByName || '-'} · ${targetText}</small>
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="list-group-item border rounded p-4 ${!item.isRead ? 'border-start border-4 border-primary bg-light bg-opacity-50' : ''}">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            ${pinIcon}<span class="fw-bold fs-5">${item.title}</span>
                            ${item.isPinned ? '<span class="badge bg-danger ms-2">置顶</span>' : ''}
                            ${!item.isRead ? '<span class="badge bg-primary ms-2">未读</span>' : ''}
                        </div>
                        <small class="text-muted">${time}</small>
                    </div>
                    <div class="mb-2 small text-muted">
                        <i class="bi bi-person"></i> 发布人：${item.createdByName || '-'}
                        <span class="mx-2">|</span>
                        <i class="bi bi-people"></i> 目标：${targetText}
                    </div>
                    <p class="mb-3" style="white-space:pre-wrap;line-height:1.8;">${item.content}</p>
                    <div class="d-flex justify-content-end">
                        ${!item.isRead ? `<button class="btn btn-sm btn-outline-primary" onclick="markSingleRead(${idx}, event)">标记已读</button>` : ''}
                        <button class="btn btn-sm btn-outline-secondary ms-2" onclick="openAnnouncementDetail(${idx})">查看详情</button>
                    </div>
                </div>
            `;
        }

        async function openAnnouncementDetail(idx) {
            const item = currentNotifications[idx];
            if (!item) return;

            if (!item.isRead) {
                try {
                    await api.request('/announcement/student/mark-read', {
                        method: 'POST',
                        body: JSON.stringify({
                            announcementId: item.announcementId,
                            studentId: session.user.uid
                        })
                    });
                    item.isRead = true;
                    refreshUnreadCount();
                } catch (err) { }
            }

            const targetText = item.targetType === 'ALL' ? '全体学生' : (item.classList && item.classList.length > 0 ? item.classList.map(c => c.className).join('、') : '');
            document.getElementById('detailAnnouncementTitle').innerText = item.title;
            document.getElementById('detailAnnouncementBody').innerHTML = `
                <div class="mb-3">
                    ${item.isPinned ? '<span class="badge bg-danger me-2">置顶</span>' : ''}
                    <small class="text-muted">发布人：${item.createdByName || '-'}</small>
                </div>
                <div class="mb-3 row small">
                    <div class="col-md-6"><span class="text-muted">目标范围：</span>${targetText}</div>
                    <div class="col-md-6"><span class="text-muted">发布时间：</span>${item.publishedAt ? item.publishedAt.replace('T', ' ') : '-'}</div>
                </div>
                <div class="mb-3 row small">
                    <div class="col-md-6"><span class="text-muted">生效时间：</span>${item.effectiveTime ? item.effectiveTime.replace('T', ' ') : '-'}</div>
                    <div class="col-md-6"><span class="text-muted">失效时间：</span>${item.expireTime ? item.expireTime.replace('T', ' ') : '长期有效'}</div>
                </div>
                <hr>
                <div style="white-space:pre-wrap;line-height:1.8;">${item.content || ''}</div>
            `;

            try { bootstrap.Dropdown.getInstance(document.querySelector('[data-bs-toggle="dropdown"]')).hide(); } catch (e) { }

            const modal = new bootstrap.Modal(document.getElementById('announcementDetailModal'));
            modal.show();

            loadNotifications();
        }

        async function markSingleRead(idx, event) {
            event.stopPropagation();
            const item = currentNotifications[idx];
            if (!item || item.isRead) return;
            try {
                await api.request('/announcement/student/mark-read', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: item.announcementId,
                        studentId: session.user.uid
                    })
                });
                item.isRead = true;
                api.showToast('已标记为已读', 'success');
                refreshUnreadCount();
                loadNotifications();
            } catch (err) { }
        }

        async function markAllAsRead() {
            try {
                await api.request('/announcement/student/mark-all-read', {
                    method: 'POST',
                    body: JSON.stringify({
                        studentId: session.user.uid,
                        classId: session.user.classId
                    })
                });
                api.showToast('已全部标记为已读', 'success');
                currentNotifications.forEach(n => n.isRead = true);
                refreshUnreadCount();
                loadNotifications();
                refreshNotificationPanel();
            } catch (err) { }
        }

        loadNews();
        refreshUnreadCount();
    </script>
</body>

</html>
