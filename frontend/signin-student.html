<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签到中心 - 学生端</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .nav-link.active {
            color: var(--primary-color) !important;
            border-bottom: 2px solid var(--primary-color);
        }
        .status-badge { padding: 0.3rem 0.8rem; border-radius: 1rem; font-size: 0.8rem; font-weight: 500; }
        .status-ongoing { background: #d3f9d8; color: #2b8a3e; }
        .status-ended { background: #f1f3f5; color: #868e96; }
        .status-signed { background: #d3f9d8; color: #2b8a3e; }
        .status-absent { background: #ffe3e3; color: #c92a2a; }
        .status-leave { background: #fff3bf; color: #e67700; }
        .signin-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            border-radius: 1rem;
            overflow: hidden;
        }
        .signin-btn {
            background: white;
            color: #764ba2;
            border: none;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 1rem 3rem;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .signin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .signin-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .countdown-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            position: relative;
        }
        .countdown-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .countdown-text {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            z-index: 1;
        }
        .stat-card {
            transition: transform 0.2s;
            border: none;
            border-radius: 0.75rem;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .history-card {
            border-left: 4px solid;
            transition: all 0.2s;
        }
        .history-card:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .history-signed { border-left-color: #2b8a3e; }
        .history-absent { border-left-color: #c92a2a; }
        .history-leave { border-left-color: #e67700; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="student.html">SchoolSystem</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-link px-3" role="button" onclick="location.href='student.html'">首页</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='student.html'">课程介绍</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='student.html'">教学内容</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='student.html'">实验内容</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='student.html'">互动交流</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='homework-student.html'">作业中心</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='exam-student.html'">在线测验</li>
                    <li class="nav-link px-3" role="button" onclick="location.href='elective-student.html'">选课中心</li>
                    <li class="nav-link px-3 active" role="button">签到中心</li>
                </ul>
                <div class="d-flex align-items-center">
                    <span id="userInfo" class="me-3 text-muted small"></span>
                    <button class="btn btn-outline-danger btn-sm" onclick="api.clearSession()">登出</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="ongoingSection" class="mb-5">
            <h5 class="fw-bold mb-3 d-flex align-items-center gap-2">
                <i class="bi bi-lightning-charge-fill text-success"></i>
                进行中的签到
            </h5>
            <div id="ongoingTasks">
                <div class="text-center py-5 text-muted">
                    <div class="spinner-border text-primary spinner-border-sm mb-3"></div>
                    <div>加载中...</div>
                </div>
            </div>
        </div>

        <div id="statsSection" class="mb-5">
            <h5 class="fw-bold mb-3 d-flex align-items-center gap-2">
                <i class="bi bi-bar-chart-fill text-primary"></i>
                我的出勤统计
            </h5>
            <div id="statsContent">
                <div class="row mb-4">
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card p-3 text-center bg-primary text-white">
                            <div class="opacity-75 small">总签到次数</div>
                            <div class="fs-3 fw-bold" id="statTotal">0</div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card p-3 text-center bg-success text-white">
                            <div class="opacity-75 small">已签到</div>
                            <div class="fs-3 fw-bold" id="statSigned">0</div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card p-3 text-center bg-danger text-white">
                            <div class="opacity-75 small">缺勤</div>
                            <div class="fs-3 fw-bold" id="statAbsent">0</div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card p-3 text-center bg-warning text-white">
                            <div class="opacity-75 small">出勤率</div>
                            <div class="fs-3 fw-bold" id="statRate">0%</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="historySection">
            <h5 class="fw-bold mb-3 d-flex align-items-center gap-2">
                <i class="bi bi-clock-history text-secondary"></i>
                签到历史记录
            </h5>
            <div id="historyContent">
                <div class="text-center py-5 text-muted">
                    <div class="spinner-border text-primary spinner-border-sm mb-3"></div>
                    <div>加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="signInSuccessModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center p-5">
                    <div class="mb-3">
                        <i class="bi bi-check-circle-fill text-success fs-1"></i>
                    </div>
                    <h5 class="fw-bold mb-2">签到成功！</h5>
                    <p class="text-muted small mb-0" id="successTime"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        let currentUser = null;
        let countdownTimers = {};
        let recordMap = {};

        document.addEventListener('DOMContentLoaded', function() {
            const session = api.getSession();
            if (!session.user || session.role !== 'student') {
                location.href = 'index.html';
                return;
            }
            currentUser = session.user;
            document.getElementById('userInfo').textContent = `${currentUser.username} (${currentUser.userno})`;
            initPage();
        });

        async function initPage() {
            await loadOngoingTasks();
            await loadCumulativeStats();
            setInterval(loadOngoingTasks, 10000);
        }

        async function loadOngoingTasks() {
            try {
                const tasks = await api.request(`/signin/task/ongoing?classId=${currentUser.classId}`);
                renderOngoingTasks(tasks);
            } catch (e) {
                console.error(e);
            }
        }

        async function renderOngoingTasks(tasks) {
            const container = document.getElementById('ongoingTasks');

            Object.values(countdownTimers).forEach(t => clearInterval(t));
            countdownTimers = {};

            if (!tasks || tasks.length === 0) {
                container.innerHTML = `
                    <div class="card p-5 text-center">
                        <i class="bi bi-moon-stars text-muted fs-1 mb-3"></i>
                        <h6 class="text-muted mb-0">当前没有进行中的签到</h6>
                        <p class="text-muted small">请等待老师发起签到</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="card signin-card p-4 mb-3" id="task-${task.taskId}">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h5 class="fw-bold mb-1">${task.title}</h5>
                            <div class="opacity-75 small">
                                <i class="bi bi-person-circle"></i> ${task.createdByName} ·
                                <i class="bi bi-people"></i> ${task.className}
                            </div>
                        </div>
                        <span class="badge bg-light text-dark px-3 py-2">
                            <i class="bi bi-play-circle-fill text-success"></i> 进行中
                        </span>
                    </div>
                    <div class="countdown-circle">
                        <div class="countdown-text" id="countdown-${task.taskId}">--:--</div>
                    </div>
                    <div id="signStatus-${task.taskId}" class="text-center">
                        <button class="btn signin-btn" onclick="doSignIn(${task.taskId})">
                            <i class="bi bi-hand-index-thumb"></i> 点击签到
                        </button>
                    </div>
                    <div class="d-flex justify-content-between mt-4 opacity-75 small">
                        <span>开始时间：${new Date(task.startTime).toLocaleString('zh-CN')}</span>
                        <span>有效时长：${task.durationMinutes} 分钟</span>
                    </div>
                </div>
            `).join('');

            for (const task of tasks) {
                await checkSignInStatus(task);
                if (task.remainingSeconds !== undefined) {
                    startTaskCountdown(task.taskId, task.remainingSeconds);
                }
            }
        }

        function startTaskCountdown(taskId, seconds) {
            const el = document.getElementById(`countdown-${taskId}`);
            let remaining = seconds;
            const update = () => {
                if (remaining <= 0) {
                    el.textContent = '已结束';
                    clearInterval(countdownTimers[taskId]);
                    setTimeout(loadOngoingTasks, 1000);
                    return;
                }
                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                el.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                remaining--;
            };
            update();
            countdownTimers[taskId] = setInterval(update, 1000);
        }

        async function checkSignInStatus(task) {
            try {
                const record = await api.request(`/signin/student/record/${task.taskId}?studentId=${currentUser.uid}`);
                recordMap[task.taskId] = record;
                const statusDiv = document.getElementById(`signStatus-${task.taskId}`);
                if (statusDiv) {
                    if (record && record.status === 'SIGNED') {
                        const time = new Date(record.signInTime).toLocaleString('zh-CN');
                        statusDiv.innerHTML = `
                            <div class="text-center">
                                <div class="mb-2"><i class="bi bi-check-circle-fill fs-1"></i></div>
                                <div class="fw-bold h5 mb-0">已完成签到</div>
                                <div class="opacity-75 small">签到时间：${time}</div>
                            </div>
                        `;
                    } else if (record && record.status === 'LEAVE') {
                        statusDiv.innerHTML = `
                            <div class="text-center">
                                <div class="mb-2"><i class="bi bi-briefcase-fill fs-1"></i></div>
                                <div class="fw-bold h5 mb-0">已请假</div>
                                <div class="opacity-75 small">${record.remark || '老师已为您标记为请假'}</div>
                            </div>
                        `;
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function doSignIn(taskId) {
            try {
                const res = await api.request('/signin/student/signin', {
                    method: 'POST',
                    body: JSON.stringify({ taskId, studentId: currentUser.uid })
                });
                if (res.success) {
                    if (res.alreadySigned) {
                        api.showToast(res.message, 'info');
                    } else {
                        document.getElementById('successTime').textContent =
                            `签到时间：${new Date(res.record.signInTime).toLocaleString('zh-CN')}`;
                        new bootstrap.Modal(document.getElementById('signInSuccessModal')).show();
                        setTimeout(() => {
                            bootstrap.Modal.getInstance(document.getElementById('signInSuccessModal')).hide();
                        }, 1500);
                    }
                    await loadOngoingTasks();
                    await loadCumulativeStats();
                } else {
                    api.showToast(res.message, 'danger');
                    if (res.message.includes('已结束') || res.message.includes('已超时')) {
                        setTimeout(loadOngoingTasks, 500);
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadCumulativeStats() {
            try {
                const data = await api.request(
                    `/signin/student/cumulative?studentId=${currentUser.uid}&classId=${currentUser.classId}`
                );
                renderCumulativeStats(data);
                renderHistory(data);
            } catch (e) {
                console.error(e);
            }
        }

        function renderCumulativeStats(data) {
            document.getElementById('statTotal').textContent = data.totalTasks;
            document.getElementById('statSigned').textContent = data.signedCount;
            document.getElementById('statAbsent').textContent = data.absentCount;
            document.getElementById('statRate').textContent = data.attendanceRate + '%';
        }

        function renderHistory(data) {
            const container = document.getElementById('historyContent');
            const tasks = data.taskList || [];
            const records = data.recordMap || {};

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="card p-5 text-center">
                        <i class="bi bi-inbox text-muted fs-1 mb-3"></i>
                        <h6 class="text-muted mb-0">暂无签到历史记录</h6>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>签到主题</th>
                                <th>发起教师</th>
                                <th>开始时间</th>
                                <th>时长</th>
                                <th>状态</th>
                                <th>签到时间</th>
                                <th>备注</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tasks.map(task => {
                                const record = records[task.taskId];
                                let statusClass = 'status-absent';
                                let statusText = '缺勤';
                                let rowClass = 'history-absent';
                                let signTime = '-';
                                let remark = '-';

                                if (record) {
                                    if (record.status === 'SIGNED') {
                                        statusClass = 'status-signed';
                                        statusText = '已签到';
                                        rowClass = 'history-signed';
                                        signTime = new Date(record.signInTime).toLocaleString('zh-CN');
                                    } else if (record.status === 'LEAVE') {
                                        statusClass = 'status-leave';
                                        statusText = '请假';
                                        rowClass = 'history-leave';
                                    }
                                    remark = record.remark || '-';
                                }

                                return `
                                    <tr class="history-card ${rowClass}">
                                        <td><div class="fw-medium">${task.title}</div><div class="small text-muted">#${task.taskId}</div></td>
                                        <td>${task.createdByName || '-'}</td>
                                        <td><small>${new Date(task.startTime).toLocaleString('zh-CN')}</small></td>
                                        <td>${task.durationMinutes}分钟</td>
                                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                                        <td><small>${signTime}</small></td>
                                        <td><small class="text-muted">${remark}</small></td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
    </script>
</body>
</html>
