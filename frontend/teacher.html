<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台 - SchoolSystemC02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: all 0.3s;
        }

        .main-content {
            margin-left: 250px;
            padding: 2rem;
            transition: all 0.3s;
        }

        .nav-link {
            border-radius: 0.5rem;
            margin: 0.2rem 0;
            padding: 0.8rem 1rem;
            color: #333;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #f0f4ff;
            color: var(--primary-color);
        }

        .nav-link i {
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="sidebar d-flex flex-column p-3">
        <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none p-2">
            <span class="fs-4 fw-bold text-primary">管理后台</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li><a href="#" class="nav-link active" onclick="loadManagePage('user')"><i
                        class="bi bi-people"></i>学生管理</a></li>
            <li><a href="#" class="nav-link" onclick="loadManagePage('test')"><i class="bi bi-book"></i>课程介绍</a></li>
            <li><a href="#" class="nav-link" onclick="loadManagePage('classes')"><i class="bi bi-layers"></i>班级管理</a>
            </li>
            <li><a href="#" class="nav-link" onclick="loadManagePage('teacher')"><i
                        class="bi bi-person-badge"></i>教师管理</a></li>
            <li><a href="#" class="nav-link" onclick="loadManagePage('course')"><i
                        class="bi bi-file-earmark-text"></i>教学内容</a></li>
            <li><a href="#" class="nav-link" onclick="loadManagePage('experiment')"><i class="bi bi-vial"></i>实验内容</a>
            </li>
            <li><a href="#" class="nav-link" onclick="loadManagePage('interaction')"><i
                        class="bi bi-chat-dots"></i>互动交流</a></li>
            <li><a href="#" class="nav-link" onclick="loadManagePage('news')"><i class="bi bi-newspaper"></i>技术动态</a>
            </li>
            <li><a href="#" class="nav-link" onclick="loadAnnouncementManage()"><i class="bi bi-megaphone"></i>公告通知</a></li>
            <li><a href="homework-manage.html" class="nav-link"><i class="bi bi-journal-text"></i>作业管理</a></li>
            <li><a href="exam-manage.html" class="nav-link"><i class="bi bi-clipboard-check"></i>在线测验</a></li>
            <li><a href="elective-manage.html" class="nav-link"><i class="bi bi-calendar-check"></i>选课管理</a></li>
            <li><a href="signin-manage.html" class="nav-link"><i class="bi bi-check2-square"></i>签到管理</a></li>
            <li><a href="message-teacher.html" class="nav-link"><i class="bi bi-chat-heart"></i>站内私信</a></li>
        </ul>
        <hr>
        <div class="p-2">
            <button class="btn btn-outline-danger w-100" onclick="api.clearSession()">登出</button>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 id="pageTitle" class="fw-bold">学生管理</h4>
            <div id="actionBtnArea">
                <button class="btn btn-primary" onclick="showAddModal()">+ 新增</button>
            </div>
        </div>

        <div class="card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Universal Modal -->
    <div class="modal fade" id="dataModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">编辑数据</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalFormBody">
                    <!-- Dynamic Form -->
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
                    <h5 class="fw-bold">确认删除？</h5>
                    <p class="text-muted small">此操作不可撤销，请谨慎操作。</p>
                    <div class="d-flex gap-2">
                        <button class="btn btn-light flex-grow-1" data-bs-dismiss="modal">取消</button>
                        <button class="btn btn-danger flex-grow-1" id="confirmDeleteBtn">确定删除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Announcement Edit Modal -->
    <div class="modal fade" id="announcementModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="announcementModalTitle">发布公告</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">公告标题 <span class="text-danger">*</span></label>
                        <input type="text" id="a_title" class="form-control" placeholder="请输入公告标题">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">公告正文 <span class="text-danger">*</span></label>
                        <textarea id="a_content" class="form-control" rows="6" placeholder="请输入公告正文内容"></textarea>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">目标范围</label>
                            <select id="a_targetType" class="form-select" onchange="toggleClassSelect()">
                                <option value="ALL">全体学生</option>
                                <option value="SPECIFIED">指定班级</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">是否置顶</label>
                            <select id="a_isPinned" class="form-select">
                                <option value="0">否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3" id="classSelectRow" style="display:none;">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">选择目标班级（可多选）</label>
                            <div id="a_classCheckboxes" class="border rounded p-3" style="max-height:150px;overflow-y:auto;">
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">生效时间</label>
                            <input type="datetime-local" id="a_effectiveTime" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">失效时间</label>
                            <input type="datetime-local" id="a_expireTime" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">置顶排序（数字越小越靠前）</label>
                        <input type="number" id="a_pinOrder" class="form-control" value="0" min="0">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-outline-primary" onclick="saveAnnouncementDraft()">保存草稿</button>
                    <button type="button" class="btn btn-primary" onclick="saveAndPublishAnnouncement()">保存并发布</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Announcement View Modal -->
    <div class="modal fade" id="announcementViewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="viewAnnouncementTitle">公告详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="viewAnnouncementBody">
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        const session = api.getSession();
        if (!session.user || session.role !== 'teacher') location.href = 'index.html';

        let currentPage = 'user';
        let currentData = [];
        let classesList = [];

        const schemas = {
            user: {
                title: '学生管理',
                endpoint: '/user',
                fields: [
                    { label: '姓名', key: 'username', type: 'text' },
                    { label: '学号', key: 'userno', type: 'text' },
                    { label: '性别', key: 'usersex', type: 'select', options: ['男', '女'] },
                    { label: '优秀', key: 'youxiuok', type: 'select', options: ['是', '否'] },
                    { label: '班级', key: 'classId', type: 'dynamicSelect' },
                    { label: '状态', key: 'checkedok', type: 'select', options: ['待审核', '已通过', '已拒绝'] }
                ],
                headers: ['姓名', '学号', '班级', '优秀', '状态', '操作']
            },
            test: {
                title: '课程介绍',
                endpoint: '/test',
                fields: [
                    { label: '标题', key: 'ttitle', type: 'text' },
                    { label: '描述', key: 'tcontent', type: 'textarea' }
                ],
                headers: ['标题', '描述', '操作']
            },
            classes: {
                title: '班级管理',
                endpoint: '/classes',
                fields: [
                    { label: '班级名称', key: 'cname', type: 'text' },
                    { label: '描述', key: 'cdescript', type: 'text' }
                ],
                headers: ['班级名称', '描述', '操作']
            },
            teacher: {
                title: '教师管理',
                endpoint: '/teacher',
                fields: [
                    { label: '姓名', key: 'tname', type: 'text' },
                    { label: '编号', key: 'tno', type: 'text' },
                    { label: '描述', key: 'tdescript', type: 'textarea' }
                ],
                headers: ['姓名', '编号', '操作']
            },
            course: {
                title: '教学内容管理',
                endpoint: '/course',
                fields: [
                    { label: '名称', key: 'ctitle', type: 'text' },
                    { label: '内容', key: 'ccontent', type: 'textarea' },
                    { label: '文件', key: 'efile', type: 'file' }
                ],
                headers: ['内容名称', '文件', '操作']
            },
            experiment: {
                title: '实验内容管理',
                endpoint: '/experiment',
                fields: [
                    { label: '名称', key: 'etitle', type: 'text' },
                    { label: '内容', key: 'econtent', type: 'textarea' },
                    { label: '文件', key: 'efile', type: 'file' }
                ],
                headers: ['实验名称', '文件', '操作']
            },
            interaction: {
                title: '互动交流',
                endpoint: '/interaction',
                fields: [
                    { label: '回复内容', key: 'comrepl', type: 'textarea' }
                ],
                headers: ['提问人', '内容', '回复', '操作'],
                hideAdd: true
            },
            news: {
                title: '技术动态管理',
                endpoint: '/news',
                fields: [
                    { label: '标题', key: 'newstitle', type: 'text' },
                    { label: '内容', key: 'newscontent', type: 'textarea' }
                ],
                headers: ['标题', '时间', '操作']
            }
        };

        async function loadManagePage(page) {
            currentPage = page;
            const schema = schemas[page];
            document.getElementById('pageTitle').innerText = schema.title;
            document.getElementById('actionBtnArea').style.display = schema.hideAdd ? 'none' : 'block';

            // Highlight nav
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active');
                if (l.innerText.includes(schema.title.substring(0, 2))) l.classList.add('active');
            });

            const head = document.getElementById('tableHead');
            head.innerHTML = `<tr>${schema.headers.map(h => `<th>${h}</th>`).join('')}</tr>`;

            if (page === 'user') await refreshClasses();

            refreshTable();
        }

        async function refreshClasses() {
            classesList = await api.request('/classes/list');
        }

        async function refreshTable() {
            const schema = schemas[currentPage];
            const body = document.getElementById('tableBody');
            body.innerHTML = '<tr><td colspan="10" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>';

            try {
                currentData = await api.request(`${schema.endpoint}/list`);
                body.innerHTML = currentData.map((item, idx) => {
                    let rows = '';
                    if (currentPage === 'user') {
                        rows = `<td>${item.username}</td><td>${item.userno}</td><td>${item.classname}</td>
                                <td><span class="badge ${item.youxiuok === '是' ? 'bg-info' : 'bg-light text-muted'}">${item.youxiuok}</span></td>
                                <td><span class="badge ${item.checkedok === '已通过' ? 'bg-success' : (item.checkedok === '待审核' ? 'bg-warning' : 'bg-danger')}">${item.checkedok}</span></td>`;
                    } else if (currentPage === 'test') {
                        rows = `<td>${item.ttitle}</td><td class="text-truncate" style="max-width: 200px">${item.tcontent}</td>`;
                    } else if (currentPage === 'classes') {
                        rows = `<td>${item.cname}</td><td>${item.cdescript}</td>`;
                    } else if (currentPage === 'teacher') {
                        rows = `<td>${item.tname}</td><td>${item.tno}</td>`;
                    } else if (currentPage === 'course') {
                        rows = `<td>${item.ctitle}</td><td>${item.efile ? `<a href="/uploads/${item.efile}" target="_blank" class="text-decoration-none"><i class="bi bi-file-earmark-text"></i> ${item.efile}</a>` : '<span class="badge bg-light text-muted">无文件</span>'}</td>`;
                    } else if (currentPage === 'experiment') {
                        rows = `<td>${item.etitle}</td><td>${item.efile ? `<a href="/uploads/${item.efile}" target="_blank" class="text-decoration-none text-success"><i class="bi bi-file-earmark-zip"></i> ${item.efile}</a>` : '<span class="badge bg-light text-muted">无文件</span>'}</td>`;
                    } else if (currentPage === 'news') {
                        rows = `<td>${item.newstitle}</td><td>${item.newsdate.split('T')[0]}</td>`;
                    } else if (currentPage === 'interaction') {
                        rows = `<td>${item.name}</td><td class="small">${item.comask}</td>
                                <td class="small text-muted">${item.comrepl || '未回复'}</td>`;
                    }

                    return `<tr>${rows}<td>
                        <button class="btn btn-sm btn-outline-primary" onclick="showEditModal(${idx})">编辑</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${idx})">删除</button>
                    </td></tr>`;
                }).join('');
            } catch (err) { }
        }

        let editingIdx = -1;

        function showAddModal() {
            editingIdx = -1;
            document.getElementById('modalTitle').innerText = '新增' + schemas[currentPage].title;
            renderForm({});
            const modal = new bootstrap.Modal(document.getElementById('dataModal'));
            modal.show();
        }

        function showEditModal(idx) {
            editingIdx = idx;
            const item = currentData[idx];
            document.getElementById('modalTitle').innerText = '编辑' + schemas[currentPage].title;
            renderForm(item);
            const modal = new bootstrap.Modal(document.getElementById('dataModal'));
            modal.show();
        }

        function renderForm(data) {
            const schema = schemas[currentPage];
            const body = document.getElementById('modalFormBody');
            body.innerHTML = schema.fields.map(f => {
                let input = '';
                const val = data[f.key] || '';
                if (f.type === 'text') input = `<input type="text" id="f_${f.key}" class="form-control" value="${val}">`;
                if (f.type === 'file') input = `<input type="file" id="f_${f.key}" class="form-control"> ${val ? `<small class="text-muted">当前文件: ${val}</small>` : ''}`;
                if (f.type === 'textarea') input = `<textarea id="f_${f.key}" class="form-control" rows="3">${val}</textarea>`;
                if (f.type === 'select') {
                    input = `<select id="f_${f.key}" class="form-select">${f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
                }
                if (f.type === 'dynamicSelect') {
                    input = `<select id="f_${f.key}" class="form-select">${classesList.map(c => `<option value="${c.cid}" ${val == c.cid ? 'selected' : ''}>${c.cname}</option>`).join('')}</select>`;
                }
                return `<div class="mb-3"><label class="form-label">${f.label}</label>${input}</div>`;
            }).join('');
        }

        async function saveData() {
            const schema = schemas[currentPage];
            const item = editingIdx === -1 ? {} : { ...currentData[editingIdx] };

            for (const f of schema.fields) {
                const input = document.getElementById(`f_${f.key}`);
                if (input) {
                    if (f.type === 'file' && input.files.length > 0) {
                        const formData = new FormData();
                        formData.append('file', input.files[0]);
                        try {
                            const res = await fetch(api.baseUrl + '/file/upload', {
                                method: 'POST',
                                body: formData
                            });
                            const uploadResult = await res.json();
                            if (uploadResult.success) {
                                item[f.key] = uploadResult.filename;
                            } else {
                                api.showToast('文件上传失败: ' + uploadResult.message, 'danger');
                                return;
                            }
                        } catch (err) {
                            api.showToast('文件上传连接错误', 'danger');
                            return;
                        }
                    } else if (f.type !== 'file') {
                        item[f.key] = input.value;
                        if (f.type === 'dynamicSelect') {
                            item.classname = input.options[input.selectedIndex].text;
                        }
                    }
                }
            }

            // Special interaction logic
            if (currentPage === 'interaction' && editingIdx !== -1) {
                item.replname = session.user.tname;
                try {
                    await api.request('/interaction/reply', { method: 'POST', body: JSON.stringify(item) });
                    api.showToast('回复成功', 'success');
                } catch (err) { return; }
            } else {
                try {
                    await api.request(`${schema.endpoint}/save`, { method: 'POST', body: JSON.stringify(item) });
                    api.showToast('保存成功', 'success');
                } catch (err) { return; }
            }

            bootstrap.Modal.getInstance(document.getElementById('dataModal')).hide();
            refreshTable();
        }

        async function confirmDelete(idx) {
            const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
            document.getElementById('confirmDeleteBtn').onclick = async () => {
                const schema = schemas[currentPage];
                const id = currentData[idx].uid || currentData[idx].tid || currentData[idx].cid || currentData[idx].nid || currentData[idx].eid || currentData[idx].id;
                try {
                    await api.request(`${schema.endpoint}/delete/${id}`, { method: 'DELETE' });
                    api.showToast('删除成功', 'success');
                    modal.hide();
                    refreshTable();
                } catch (err) { }
            };
            modal.show();
        }

        let announcementData = [];
        let editingAnnouncementId = null;

        function loadAnnouncementManage() {
            currentPage = 'announcement';
            document.getElementById('pageTitle').innerText = '公告通知管理';
            document.getElementById('actionBtnArea').innerHTML = '<button class="btn btn-primary" onclick="showAddAnnouncementModal()">+ 发布公告</button>';

            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active');
                if (l.innerText.includes('公告通知')) l.classList.add('active');
            });

            refreshAnnouncements();
        }

        async function refreshAnnouncements() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '<tr><td colspan="10" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>';

            const head = document.getElementById('tableHead');
            head.innerHTML = `<tr>
                <th>标题</th>
                <th>目标范围</th>
                <th>置顶</th>
                <th>状态</th>
                <th>发布时间</th>
                <th>有效期</th>
                <th>创建人</th>
                <th>操作</th>
            </tr>`;

            try {
                await refreshClasses();
                announcementData = await api.request('/announcement/list');
                body.innerHTML = announcementData.map((item, idx) => {
                    const statusBadge = item.status === 'PUBLISHED' ? 'bg-success' : (item.status === 'DRAFT' ? 'bg-secondary' : 'bg-danger');
                    const statusText = item.status === 'PUBLISHED' ? '已发布' : (item.status === 'DRAFT' ? '草稿' : '已撤回');
                    const targetText = item.targetType === 'ALL' ? '全体学生' : (item.classList && item.classList.length > 0 ? item.classList.map(c => c.className).join('、') : '-');
                    const timeRange = (item.effectiveTime ? item.effectiveTime.split('T')[0] : '-') + ' ~ ' + (item.expireTime ? item.expireTime.split('T')[0] : '-');

                    return `<tr>
                        <td>
                            ${item.isPinned ? '<i class="bi bi-pin-angle-fill text-danger me-1"></i>' : ''}
                            <a href="#" onclick="viewAnnouncement(${idx})" class="text-decoration-none fw-bold">${item.title}</a>
                        </td>
                        <td><small class="text-muted">${targetText}</small></td>
                        <td>${item.isPinned ? '<span class="badge bg-danger">置顶</span>' : '<span class="text-muted">-</span>'}</td>
                        <td><span class="badge ${statusBadge}">${statusText}</span></td>
                        <td><small>${item.publishedAt ? item.publishedAt.replace('T', ' ') : '-'}</small></td>
                        <td><small class="text-muted">${timeRange}</small></td>
                        <td><small>${item.createdByName || '-'}</small></td>
                        <td>
                            <button class="btn btn-sm btn-outline-info me-1" onclick="viewAnnouncement(${idx})">查看</button>
                            ${item.status !== 'REVOKED' ? `<button class="btn btn-sm btn-outline-primary me-1" onclick="editAnnouncement(${idx})">编辑</button>` : ''}
                            ${item.status === 'DRAFT' ? `<button class="btn btn-sm btn-outline-success me-1" onclick="publishAnnouncement(${idx})">发布</button>` : ''}
                            ${item.status === 'PUBLISHED' ? `<button class="btn btn-sm btn-outline-warning me-1" onclick="revokeAnnouncement(${idx})">撤回</button>` : ''}
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteAnnouncement(${idx})">删除</button>
                        </td>
                    </tr>`;
                }).join('');
            } catch (err) {
                body.innerHTML = '<tr><td colspan="8" class="text-center py-5 text-muted">加载失败</td></tr>';
            }
        }

        function showAddAnnouncementModal() {
            editingAnnouncementId = null;
            document.getElementById('announcementModalTitle').innerText = '发布公告';
            document.getElementById('a_title').value = '';
            document.getElementById('a_content').value = '';
            document.getElementById('a_targetType').value = 'ALL';
            document.getElementById('a_isPinned').value = '0';
            document.getElementById('a_pinOrder').value = '0';
            document.getElementById('a_effectiveTime').value = '';
            document.getElementById('a_expireTime').value = '';
            toggleClassSelect();
            renderClassCheckboxes([]);
            const modal = new bootstrap.Modal(document.getElementById('announcementModal'));
            modal.show();
        }

        function editAnnouncement(idx) {
            const item = announcementData[idx];
            editingAnnouncementId = item.announcementId;
            document.getElementById('announcementModalTitle').innerText = '编辑公告';
            document.getElementById('a_title').value = item.title;
            document.getElementById('a_content').value = item.content;
            document.getElementById('a_targetType').value = item.targetType;
            document.getElementById('a_isPinned').value = item.isPinned;
            document.getElementById('a_pinOrder').value = item.pinOrder;
            document.getElementById('a_effectiveTime').value = item.effectiveTime ? item.effectiveTime.substring(0, 16) : '';
            document.getElementById('a_expireTime').value = item.expireTime ? item.expireTime.substring(0, 16) : '';
            toggleClassSelect();
            const selectedIds = item.classList ? item.classList.map(c => c.classId) : [];
            renderClassCheckboxes(selectedIds);
            const modal = new bootstrap.Modal(document.getElementById('announcementModal'));
            modal.show();
        }

        function viewAnnouncement(idx) {
            const item = announcementData[idx];
            document.getElementById('viewAnnouncementTitle').innerText = item.title;
            const statusBadge = item.status === 'PUBLISHED' ? 'bg-success' : (item.status === 'DRAFT' ? 'bg-secondary' : 'bg-danger');
            const statusText = item.status === 'PUBLISHED' ? '已发布' : (item.status === 'DRAFT' ? '草稿' : '已撤回');
            const targetText = item.targetType === 'ALL' ? '全体学生' : (item.classList && item.classList.length > 0 ? item.classList.map(c => c.className).join('、') : '-');

            document.getElementById('viewAnnouncementBody').innerHTML = `
                <div class="mb-3">
                    <span class="badge ${statusBadge} me-2">${statusText}</span>
                    ${item.isPinned ? '<span class="badge bg-danger me-2">置顶</span>' : ''}
                    <small class="text-muted">发布人：${item.createdByName || '-'}</small>
                </div>
                <div class="mb-3 row small">
                    <div class="col-md-6"><span class="text-muted">目标范围：</span>${targetText}</div>
                    <div class="col-md-6"><span class="text-muted">发布时间：</span>${item.publishedAt ? item.publishedAt.replace('T', ' ') : '-'}</div>
                </div>
                <div class="mb-3 row small">
                    <div class="col-md-6"><span class="text-muted">生效时间：</span>${item.effectiveTime ? item.effectiveTime.replace('T', ' ') : '-'}</div>
                    <div class="col-md-6"><span class="text-muted">失效时间：</span>${item.expireTime ? item.expireTime.replace('T', ' ') : '-'}</div>
                </div>
                <hr>
                <div style="white-space:pre-wrap;line-height:1.8;">${item.content || ''}</div>
            `;
            const modal = new bootstrap.Modal(document.getElementById('announcementViewModal'));
            modal.show();
        }

        function toggleClassSelect() {
            const targetType = document.getElementById('a_targetType').value;
            document.getElementById('classSelectRow').style.display = targetType === 'SPECIFIED' ? 'flex' : 'none';
            if (targetType === 'SPECIFIED') {
                renderClassCheckboxes([]);
            }
        }

        function renderClassCheckboxes(selectedIds) {
            const container = document.getElementById('a_classCheckboxes');
            container.innerHTML = classesList.map(c => `
                <div class="form-check form-check-inline me-3 mb-2">
                    <input class="form-check-input" type="checkbox" value="${c.cid}" id="class_${c.cid}" ${selectedIds.includes(c.cid) ? 'checked' : ''}>
                    <label class="form-check-label" for="class_${c.cid}">${c.cname}</label>
                </div>
            `).join('');
        }

        function getSelectedClassIds() {
            const checkboxes = document.querySelectorAll('#a_classCheckboxes input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => parseInt(cb.value));
        }

        function collectAnnouncementData() {
            const title = document.getElementById('a_title').value.trim();
            const content = document.getElementById('a_content').value.trim();
            if (!title) { api.showToast('请输入公告标题', 'danger'); return null; }
            if (!content) { api.showToast('请输入公告正文', 'danger'); return null; }

            const targetType = document.getElementById('a_targetType').value;
            let classIds = [];
            if (targetType === 'SPECIFIED') {
                classIds = getSelectedClassIds();
                if (classIds.length === 0) { api.showToast('请至少选择一个目标班级', 'danger'); return null; }
            }

            const effectiveTime = document.getElementById('a_effectiveTime').value;
            const expireTime = document.getElementById('a_expireTime').value;
            if (effectiveTime && expireTime && new Date(effectiveTime) > new Date(expireTime)) {
                api.showToast('生效时间不能晚于失效时间', 'danger');
                return null;
            }

            return {
                announcementId: editingAnnouncementId,
                title: title,
                content: content,
                contentType: 'TEXT',
                targetType: targetType,
                isPinned: parseInt(document.getElementById('a_isPinned').value),
                pinOrder: parseInt(document.getElementById('a_pinOrder').value) || 0,
                effectiveTime: effectiveTime || null,
                expireTime: expireTime || null,
                classIds: classIds,
                createdBy: session.user.tid,
                createdByName: session.user.tname,
                status: 'DRAFT'
            };
        }

        async function saveAnnouncementDraft() {
            const data = collectAnnouncementData();
            if (!data) return;
            data.status = 'DRAFT';
            try {
                await api.request('/announcement/save', { method: 'POST', body: JSON.stringify(data) });
                api.showToast('草稿保存成功', 'success');
                bootstrap.Modal.getInstance(document.getElementById('announcementModal')).hide();
                refreshAnnouncements();
            } catch (err) { }
        }

        async function saveAndPublishAnnouncement() {
            const data = collectAnnouncementData();
            if (!data) return;
            data.status = 'PUBLISHED';
            try {
                const result = await api.request('/announcement/save', { method: 'POST', body: JSON.stringify(data) });
                if (result && data.announcementId === null) {
                    const list = await api.request('/announcement/list');
                    const latest = list.find(a => a.title === data.title && a.status === 'DRAFT');
                    if (latest) {
                        await api.request(`/announcement/publish/${latest.announcementId}`, { method: 'POST' });
                    }
                } else if (data.announcementId !== null && data.status === 'PUBLISHED') {
                    await api.request(`/announcement/publish/${data.announcementId}`, { method: 'POST' });
                }
                api.showToast('公告发布成功', 'success');
                bootstrap.Modal.getInstance(document.getElementById('announcementModal')).hide();
                refreshAnnouncements();
            } catch (err) { }
        }

        async function publishAnnouncement(idx) {
            const item = announcementData[idx];
            try {
                await api.request(`/announcement/publish/${item.announcementId}`, { method: 'POST' });
                api.showToast('发布成功', 'success');
                refreshAnnouncements();
            } catch (err) { }
        }

        async function revokeAnnouncement(idx) {
            const item = announcementData[idx];
            if (!confirm('确认撤回该公告？撤回后学生将无法看到。')) return;
            try {
                await api.request(`/announcement/revoke/${item.announcementId}`, { method: 'POST' });
                api.showToast('已撤回', 'success');
                refreshAnnouncements();
            } catch (err) { }
        }

        async function deleteAnnouncement(idx) {
            const item = announcementData[idx];
            const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
            document.getElementById('confirmDeleteBtn').onclick = async () => {
                try {
                    await api.request(`/announcement/delete/${item.announcementId}`, { method: 'DELETE' });
                    api.showToast('删除成功', 'success');
                    modal.hide();
                    refreshAnnouncements();
                } catch (err) { }
            };
            modal.show();
        }

        loadManagePage('user');
    </script>
</body>

</html>
